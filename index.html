  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0f0c29}
    body{
      font-family:-apple-system,sans-serif;
      background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
      min-height:100vh;min-height:-webkit-fill-available;
      display:flex;align-items:center;justify-content:center;
      padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-tap-highlight-color:transparent;
      user-select:none;-webkit-user-select:none;
    }
    #root{width:100%;display:flex;align-items:center;justify-content:center}
    .calc{
      width:min(96vw,400px);border-radius:28px;
      background:rgba(0,0,0,0.62);
      backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 24px 70px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.1);
      padding:16px 14px 14px;
    }
    .display-area{
      background:rgba(255,255,255,0.03);border-radius:18px;
      border:1px solid rgba(255,255,255,0.05);margin-bottom:10px;overflow:hidden;
    }
    .indicators{display:flex;justify-content:space-between;align-items:center;padding:8px 12px 0;min-height:20px}
    .mem-indicator{display:flex;align-items:center;gap:5px}
    .mem-dot{width:6px;height:6px;border-radius:50%;background:rgba(80,200,255,0.95);box-shadow:0 0 8px rgba(80,200,255,0.9);display:none}
    .mem-label{font-size:11px;font-weight:600;letter-spacing:1px;color:rgba(80,200,255,0.95);display:none}
    .mem-val{font-size:11px;color:rgba(255,255,255,0.4);font-weight:300;display:none}
    .paren-ind{font-size:11px;color:rgba(180,210,255,0.8);letter-spacing:1px;min-width:20px;text-align:right}
    .history{height:110px;overflow-y:auto;padding:4px 12px 2px;scrollbar-width:none}
    .history::-webkit-scrollbar{display:none}
    .hist-empty{height:100%;display:flex;align-items:center;justify-content:flex-end;color:rgba(255,255,255,0.12);font-size:12px;font-style:italic}
    .hist-item{text-align:right;margin-bottom:6px}
    .hist-expr{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:1px;word-break:break-all}
    .hist-res{font-size:18px;color:#fff;font-weight:200;letter-spacing:-0.5px}
    .divider{height:1px;background:rgba(255,255,255,0.06);margin:0 12px}
    .cur-expr{text-align:right;color:rgba(255,255,255,0.38);font-size:12px;min-height:20px;padding:4px 12px 0;word-break:break-all;line-height:1.4}
    .main-disp{text-align:right;color:#fff;font-weight:200;letter-spacing:-2px;padding:2px 12px 14px;line-height:1.1;word-break:break-all;transition:background 0.15s}
    .flash-s{background:rgba(80,220,140,0.25)}
    .flash-r{background:rgba(80,160,255,0.25)}
    .flash-c{background:rgba(255,90,90,0.25)}
    button{border:none;outline:none;cursor:pointer;border-radius:999px;font-family:inherit;transition:transform 0.08s,opacity 0.08s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    button:active{transform:scale(0.92);opacity:0.8}
    .mem-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07)}
    .mbtn{height:38px;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);font-size:12px;font-weight:500;letter-spacing:0.5px;border:1px solid rgba(255,255,255,0.07)}
    .mbtn.active-r{background:rgba(80,160,255,0.18);color:rgba(130,195,255,1)}
    .mbtn.active-c{background:rgba(255,70,70,0.15);color:rgba(255,130,130,1)}
    .btn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
    .btn{height:58px;font-size:20px;font-weight:300;background:rgba(255,255,255,0.12);color:#fff}
    .op{background:rgba(255,149,0,0.85);font-size:22px;box-shadow:0 3px 14px rgba(255,149,0,0.3)}
    .eq{background:rgba(255,149,0,0.85);font-size:24px;box-shadow:0 3px 14px rgba(255,149,0,0.3);grid-column:span 3}
    .ac{background:rgba(255,65,65,0.22);color:rgba(255,120,120,1);font-size:13px;font-weight:600}
    .cc{background:rgba(255,190,60,0.2);color:rgba(255,210,100,1);font-size:13px;font-weight:600}
    .bs{background:rgba(180,120,255,0.18);color:rgba(200,160,255,1);font-size:17px}
    .par{background:rgba(255,255,255,0.08);color:rgba(180,210,255,0.9);font-size:20px;font-weight:400}
    .fn{background:rgba(255,255,255,0.14);font-size:13px;font-weight:500}
  </style>
</head>
<body>
<div id="root">
  <div class="calc">
    <div class="display-area">
      <div class="indicators">
        <div class="mem-indicator">
          <span class="mem-dot" id="mDot"></span>
          <span class="mem-label" id="mLabel">M</span>
          <span class="mem-val" id="mVal"></span>
        </div>
        <div class="paren-ind" id="pInd"></div>
      </div>
      <div class="history" id="hist">
        <div class="hist-empty" id="histEmpty">履歴なし</div>
      </div>
      <div class="divider"></div>
      <div class="cur-expr" id="curExpr">&nbsp;</div>
      <div class="main-disp" id="mainDisp" style="font-size:56px">0</div>
    </div>
    <div class="mem-row">
      <button class="mbtn" id="btnMC" onclick="doMem('MC')">MC</button>
      <button class="mbtn" id="btnMR" onclick="doMem('MR')">MR</button>
      <button class="mbtn" onclick="doMem('MS')">M&minus;</button>
      <button class="mbtn" onclick="doMem('MA')">M+</button>
    </div>
    <div class="btn-grid">
      <button class="btn ac"  onclick="doBtn('AC')">AC</button>
      <button class="btn cc"  onclick="doBtn('C')">C</button>
      <button class="btn par" onclick="doBtn('LP')">(</button>
      <button class="btn par" onclick="doBtn('RP')">)</button>
      <button class="btn bs"  onclick="doBtn('BS')">&#x232b;</button>
      <button class="btn" onclick="doBtn('7')">7</button>
      <button class="btn" onclick="doBtn('8')">8</button>
      <button class="btn" onclick="doBtn('9')">9</button>
      <button class="btn fn" onclick="doBtn('PM')">+/-</button>
      <button class="btn fn" onclick="doBtn('PCT')">%</button>
      <button class="btn" onclick="doBtn('4')">4</button>
      <button class="btn" onclick="doBtn('5')">5</button>
      <button class="btn" onclick="doBtn('6')">6</button>
      <button class="btn op" onclick="doBtn('MUL')">&#xd7;</button>
      <button class="btn op" onclick="doBtn('DIV')">&#xf7;</button>
      <button class="btn" onclick="doBtn('1')">1</button>
      <button class="btn" onclick="doBtn('2')">2</button>
      <button class="btn" onclick="doBtn('3')">3</button>
      <button class="btn op" onclick="doBtn('ADD')">+</button>
      <button class="btn op" onclick="doBtn('SUB')">&minus;</button>
      <button class="btn" onclick="doBtn('0')">0</button>
      <button class="btn" onclick="doBtn('DOT')">.</button>
      <button class="btn eq" onclick="doBtn('EQ')">=</button>
    </div>
  </div>
</div>
<script>
// ===== 状態 =====
var gExpr = '';
var gDisp = '0';
var gJustEvaled = false;
var gHistory = [];
var gMemory = 0;

// ===== カンマ付与（表示専用） =====
function withCommas(s) {
  if (!s) return s;
  var neg = s.charAt(0) === '-';
  var t = neg ? s.slice(1) : s;
  var dot = t.indexOf('.');
  var intPart = dot >= 0 ? t.slice(0, dot) : t;
  var decPart = dot >= 0 ? t.slice(dot) : '';
  var r = '';
  for (var i = 0; i < intPart.length; i++) {
    if (i > 0 && (intPart.length - i) % 3 === 0) r += ',';
    r += intPart.charAt(i);
  }
  return (neg ? '-' : '') + r + decPart;
}

// ===== 数値フォーマット =====
function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return 'Error';
  if (!isFinite(n)) return n > 0 ? '∞' : '-∞';
  var a = Math.abs(n);
  var d = a < 1 ? 1 : Math.floor(Math.log10(a)) + 1;
  if (d > 15) return n.toExponential(4);
  if (n === Math.floor(n)) return String(n);
  var dp = Math.max(0, 14 - d);
  return n.toFixed(dp).replace(/\.?0+$/, '');
}

// ===== 評価器 =====
function calcEval(s) {
  var pos = 0;
  var toks = [];
  var i = 0;
  // トークナイズ
  while (i < s.length) {
    var c = s.charAt(i);
    if (c === ' ') { i++; continue; }
    if (c >= '0' && c <= '9' || c === '.') {
      var num = '';
      while (i < s.length && (s.charAt(i) >= '0' && s.charAt(i) <= '9' || s.charAt(i) === '.')) {
        num += s.charAt(i); i++;
      }
      toks.push({ t: 'n', v: parseFloat(num) });
    } else if (c === '+') { toks.push({ t: 'o', v: '+' }); i++; }
      else if (c === '-') { toks.push({ t: 'o', v: '-' }); i++; }
      else if (c === '−') { toks.push({ t: 'o', v: '-' }); i++; }
      else if (c === '×') { toks.push({ t: 'o', v: '*' }); i++; }
      else if (c === '÷') { toks.push({ t: 'o', v: '/' }); i++; }
      else if (c === '(') { toks.push({ t: 'l' }); i++; }
      else if (c === ')') { toks.push({ t: 'r' }); i++; }
      else { i++; }
  }
  if (toks.length === 0) return null;

  function peek() { return toks[pos]; }
  function eat() { return toks[pos++]; }

  function parseExpr() { return parseAdd(); }
  function parseAdd() {
    var left = parseMul();
    while (peek() && peek().t === 'o' && (peek().v === '+' || peek().v === '-')) {
      var op = eat().v;
      var right = parseMul();
      left = op === '+' ? left + right : left - right;
    }
    return left;
  }
  function parseMul() {
    var left = parseUnary();
    while (peek() && peek().t === 'o' && (peek().v === '*' || peek().v === '/')) {
      var op = eat().v;
      var right = parseUnary();
      left = op === '*' ? left * right : (right !== 0 ? left / right : NaN);
    }
    return left;
  }
  function parseUnary() {
    if (peek() && peek().t === 'o' && peek().v === '-') { eat(); return -parsePrimary(); }
    if (peek() && peek().t === 'o' && peek().v === '+') { eat(); return parsePrimary(); }
    return parsePrimary();
  }
  function parsePrimary() {
    var t = peek();
    if (!t) return 0;
    if (t.t === 'n') { eat(); return t.v; }
    if (t.t === 'l') {
      eat();
      var v = parseExpr();
      if (peek() && peek().t === 'r') eat();
      return v;
    }
    return 0;
  }

  try {
    var result = parseExpr();
    return isFinite(result) ? result : null;
  } catch(e) {
    return null;
  }
}

// ===== 括弧カウント =====
function unclosed(s) {
  var c = 0;
  for (var i = 0; i < s.length; i++) {
    if (s.charAt(i) === '(') c++;
    else if (s.charAt(i) === ')') c--;
  }
  return c < 0 ? 0 : c;
}

function lastCh(s) { return s.length ? s.charAt(s.length - 1) : ''; }
function isOp(c) { return c === '+' || c === '−' || c === '×' || c === '÷'; }

// ===== 画面更新 =====
function render() {
  // メイン表示
  var dText = gDisp !== '' ? gDisp : (gExpr === '' ? '0' : '');
  var dShow = (dText === 'Error' || dText === '∞' || dText === '-∞') ? dText : withCommas(dText);
  var len = dShow.length;
  var fs = len > 14 ? 18 : len > 11 ? 24 : len > 8 ? 36 : len > 5 ? 46 : 56;
  var md = document.getElementById('mainDisp');
  md.textContent = dShow;
  md.style.fontSize = fs + 'px';

  // 式
  document.getElementById('curExpr').textContent = gExpr || ' ';

  // 括弧インジケーター
  var u = unclosed(gExpr);
  document.getElementById('pInd').textContent = u > 0 ? '('.repeat(u > 4 ? 4 : u) : '';

  // メモリー
  var hasM = gMemory !== 0;
  document.getElementById('mDot').style.display = hasM ? 'inline-block' : 'none';
  document.getElementById('mLabel').style.display = hasM ? 'inline' : 'none';
  document.getElementById('mVal').style.display = hasM ? 'inline' : 'none';
  if (hasM) document.getElementById('mVal').textContent = '= ' + withCommas(fmtNum(gMemory));
  document.getElementById('btnMR').className = 'mbtn' + (hasM ? ' active-r' : '');
  document.getElementById('btnMC').className = 'mbtn' + (hasM ? ' active-c' : '');

  // 履歴
  var histEl = document.getElementById('hist');
  var emptyEl = document.getElementById('histEmpty');
  var items = histEl.getElementsByClassName('hist-item');
  while (items.length > 0) items[0].parentNode.removeChild(items[0]);
  if (gHistory.length === 0) {
    emptyEl.style.display = 'flex';
  } else {
    emptyEl.style.display = 'none';
    for (var i = 0; i < gHistory.length; i++) {
      var div = document.createElement('div');
      div.className = 'hist-item';
      div.style.opacity = String(0.35 + (i / gHistory.length) * 0.65);
      var e1 = document.createElement('div');
      e1.className = 'hist-expr';
      e1.textContent = gHistory[i].expr;
      var e2 = document.createElement('div');
      e2.className = 'hist-res';
      e2.textContent = '= ' + withCommas(gHistory[i].res);
      div.appendChild(e1);
      div.appendChild(e2);
      histEl.appendChild(div);
    }
    histEl.scrollTop = histEl.scrollHeight;
  }
}

// ===== フラッシュ =====
function flash(type) {
  var md = document.getElementById('mainDisp');
  md.className = 'main-disp';
  var cls = type === 's' ? 'flash-s' : type === 'r' ? 'flash-r' : 'flash-c';
  md.className = 'main-disp ' + cls;
  setTimeout(function() { md.className = 'main-disp'; }, 500);
}

// ===== メモリー操作 =====
function doMem(cmd) {
  var cur = parseFloat(gDisp) || 0;
  if (cmd === 'MC') { gMemory = 0; flash('c'); }
  else if (cmd === 'MR') {
    var ms = fmtNum(gMemory);
    gExpr = (gJustEvaled ? '' : gExpr) + ms;
    gDisp = ms; gJustEvaled = false; flash('r');
  }
  else if (cmd === 'MA') { gMemory += cur; flash('s'); }
  else if (cmd === 'MS') { gMemory -= cur; flash('s'); }
  render();
}

// ===== ボタン操作 =====
function doBtn(cmd) {
  // 数字・小数点
  if (cmd >= '0' && cmd <= '9' || cmd === 'DOT') {
    var ch = cmd === 'DOT' ? '.' : cmd;
    var base = gExpr;
    if (gJustEvaled) { base = ''; gJustEvaled = false; }
    if (ch === '.') {
      var m = base.match(/[\d.]*$/);
      if (m && m[0].indexOf('.') >= 0) { render(); return; }
    }
    gExpr = base + ch;
    var m2 = gExpr.match(/[\d.]+$/);
    gDisp = m2 ? m2[0] : ch;
  }
  // 演算子
  else if (cmd === 'ADD' || cmd === 'SUB' || cmd === 'MUL' || cmd === 'DIV') {
    var opChar = cmd === 'ADD' ? '+' : cmd === 'SUB' ? '−' : cmd === 'MUL' ? '×' : '÷';
    gJustEvaled = false;
    var base = gExpr.trimRight ? gExpr.trimRight() : gExpr.replace(/\s+$/, '');
    if (base.length > 0 && isOp(lastCh(base))) {
      base = base.slice(0, -1).replace(/\s+$/, '');
    }
    if (lastCh(base) === '(') { render(); return; }
    if (base === '') base = '0';
    gExpr = base + ' ' + opChar + ' ';
    gDisp = opChar;
  }
  // AC
  else if (cmd === 'AC') {
    gExpr = ''; gDisp = '0'; gJustEvaled = false;
  }
  // C
  else if (cmd === 'C') {
    if (gJustEvaled) { gExpr = ''; gDisp = '0'; gJustEvaled = false; }
    else {
      var t = gExpr.replace(/[\d.]+$/, '');
      gExpr = t; gDisp = t === '' ? '0' : '';
    }
  }
  // バックスペース
  else if (cmd === 'BS') {
    if (gJustEvaled) { gExpr = ''; gDisp = '0'; gJustEvaled = false; }
    else {
      gExpr = gExpr.slice(0, -1);
      var m = gExpr.match(/[\d.]+$/);
      gDisp = m ? m[0] : gExpr === '' ? '0' : '';
    }
  }
  // 左括弧
  else if (cmd === 'LP') {
    var base = gJustEvaled ? '' : gExpr;
    gJustEvaled = false;
    var lc = lastCh(base);
    if (lc >= '0' && lc <= '9' || lc === ')') base += ' × ';
    gExpr = base + '(';
    gDisp = '(';
  }
  // 右括弧
  else if (cmd === 'RP') {
    gJustEvaled = false;
    if (unclosed(gExpr) <= 0) { render(); return; }
    var lc = lastCh(gExpr);
    if (isOp(lc) || lc === '(') { render(); return; }
    gExpr = gExpr + ')';
    var v = calcEval(gExpr);
    gDisp = v !== null ? fmtNum(v) : ')';
  }
  // +/-
  else if (cmd === 'PM') {
    gJustEvaled = false;
    var m = gExpr.match(/([\d.]+)$/);
    if (!m) { render(); return; }
    var v = -parseFloat(m[1]);
    var fv = fmtNum(v);
    gExpr = gExpr.slice(0, -m[1].length) + fv;
    gDisp = fv;
  }
  // %
  else if (cmd === 'PCT') {
    gJustEvaled = false;
    var m = gExpr.match(/([\d.]+)$/);
    if (!m) { render(); return; }
    var v = parseFloat(m[1]) / 100;
    var fv = fmtNum(v);
    gExpr = gExpr.slice(0, -m[1].length) + fv;
    gDisp = fv;
  }
  // イコール
  else if (cmd === 'EQ') {
    if (gExpr === '') { render(); return; }
    var evalStr = gExpr.replace(/\s+$/, '');
    var u = unclosed(evalStr);
    for (var i = 0; i < u; i++) evalStr += ')';
    var result = calcEval(evalStr);
    if (result === null) { gDisp = 'Error'; render(); return; }
    var rs = fmtNum(result);
    gHistory.push({ expr: evalStr, res: rs });
    if (gHistory.length > 5) gHistory.shift();
    gExpr = rs;
    gDisp = rs;
    gJustEvaled = true;
  }
  render();
}

render();
</script>
</body>
</html>
